<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- piano keyboard outer border -->
  <rect x="4" y="12" width="40" height="26" rx="3"/>
  <!-- white key dividers (4 internal lines) -->
  <line x1="12" y1="12" x2="12" y2="38"/>
  <line x1="20" y1="12" x2="20" y2="38"/>
  <line x1="28" y1="12" x2="28" y2="38"/>
  <line x1="36" y1="12" x2="36" y2="38"/>
  <!-- black keys (3 raised keys over gaps) -->
  <rect x="8" y="12" width="6" height="16" rx="2" fill="#3b82f6"/>
  <rect x="24" y="12" width="6" height="16" rx="2" fill="#3b82f6"/>
  <rect x="32" y="12" width="6" height="16" rx="2" fill="#3b82f6"/>
</svg>
